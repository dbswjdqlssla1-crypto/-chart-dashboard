<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4대 음악 차트 분석</title>
<style>
  :root{
    --bg:#12141a; --bg-elevated:#1b1e27; --text:#ece7dc; --text-dim:#9a9fb3;
    --line:rgba(255,255,255,0.09); --accent:#e8b23d; --accent-soft:rgba(232,178,61,0.14);
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f4efe4; --bg-elevated:#ffffff; --text:#201d16; --text-dim:#5c5646;
      --line:rgba(32,29,22,0.12); --accent:#a8710a; --accent-soft:rgba(168,113,10,0.12); }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;
  }
  .wrap{max-width:420px; width:100%;}
  .eyebrow{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);font-weight:700;}
  h1{font-size:26px;margin:10px 0 24px;letter-spacing:-0.01em;}
  a.card{
    display:block; background:var(--bg-elevated); border:1px solid var(--line);
    border-radius:14px; padding:20px; margin-bottom:14px; text-decoration:none; color:var(--text);
  }
  a.card .t{font-size:16px;font-weight:700;}
  a.card .d{font-size:13px;color:var(--text-dim);margin-top:6px;line-height:1.5;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Music Chart Analysis</div>
    <h1>4대 음악 차트 분석</h1>
    <a class="card" href="./dashboard.html">
      <div class="t">🎧 컴퓨터용 — 전체 대시보드</div>
      <div class="d">공통점·차이점·트렌드 예측·곡 해부. 월 1회 갱신.</div>
    </a>
    <a class="card" href="./mobile-brief.html">
      <div class="t">🎼 핸드폰용 — 신곡 워치</div>
      <div class="d">새로 차팅한 곡만 골라 탭하면 분석 화면으로. 신곡 나올 때마다 갱신.</div>
    </a>
  </div>
</body>
</html>
